name: push-metrics
description: >-
  Pushea el estado de una prueba de CI (Trivy, CodeQL, lint, unit, Newman,
  Playwright) al Pushgateway central (cicd-metrics.worldbinary.pro). Alimenta el
  dashboard Grafana "CI/CD — Semáforo de pruebas". Nunca rompe el build: si
  faltan credenciales/contexto o el Pushgateway no responde, solo avisa.

inputs:
  auth:
    description: 'Credenciales basicAuth "usuario:clave" (secret PUSHGW_AUTH). Si vacío, se omite el push.'
    required: false
    default: ''
  url:
    description: URL base del Pushgateway (host reportes-ci-cd, path /metrics).
    required: false
    default: https://reportes-ci-cd.worldbinary.pro
  product:
    description: Producto (worldbinary, worldbinarytv...). Si vacío, se omite el push.
    required: false
    default: ''
  micro:
    description: Nombre del microservicio. Si vacío, se omite el push.
    required: false
    default: ''
  env:
    description: Entorno (dev, qa, staging, prod). Si vacío, se omite el push.
    required: false
    default: ''
  check:
    description: 'Tipo de prueba: trivy|codeql|lint|unit|newman|playwright.'
    required: true
  status:
    description: '1 = pasó, 0 = falló.'
    required: true
  branch:
    description: Rama/tag del build.
    required: false
    default: ''
  build_id:
    description: ID del run de GitHub Actions (github.run_id).
    required: false
    default: ''
  commit:
    description: Commit SHA (github.sha).
    required: false
    default: ''
  version:
    description: Versión/tag de imagen, si aplica.
    required: false
    default: ''
  extra:
    description: >-
      Líneas extra de métricas en formato exposición Prometheus, sin los labels
      de grouping (product/micro/env/check los agrega el Pushgateway). Ej:
      'cicd_vulnerabilities{severity="CRITICAL"} 2'.
    required: false
    default: ''
  report:
    description: >-
      Reporte/salida literal del paso (error de tsc/lint, resumen de Trivy, tests
      fallidos, etc.). Se sanea (escape + truncado a 800 chars) y se pushea como
      label de la métrica cicd_check_report para consultarlo en Grafana. Vacío = no
      se pushea reporte. NO usar para Sonar (Sonar no reporta al Pushgateway).
    required: false
    default: ''

runs:
  using: composite
  steps:
    - shell: bash
      env:
        DD_AUTH: ${{ inputs.auth }}
        URL: ${{ inputs.url }}
        PRODUCT: ${{ inputs.product }}
        MICRO: ${{ inputs.micro }}
        ENVIRON: ${{ inputs.env }}
        CHECK: ${{ inputs.check }}
        STATUS: ${{ inputs.status }}
        BRANCH: ${{ inputs.branch }}
        BUILD_ID: ${{ inputs.build_id }}
        COMMIT: ${{ inputs.commit }}
        VERSION: ${{ inputs.version }}
        EXTRA: ${{ inputs.extra }}
        REPORT: ${{ inputs.report }}
      run: |
        if [ -z "$DD_AUTH" ] || [ -z "$PRODUCT" ] || [ -z "$MICRO" ] || [ -z "$ENVIRON" ]; then
          echo "push-metrics: falta auth/product/micro/env, se omite el push (no rompe el build)."
          exit 0
        fi

        # Cuerpo en formato exposición Prometheus. Los labels de grouping
        # (product/micro/env/check) NO van aquí: los agrega el Pushgateway desde
        # la URL. El push reemplaza solo ese grupo.
        body="cicd_check_status{branch=\"${BRANCH}\"} ${STATUS}
        cicd_check_info{build_id=\"${BUILD_ID}\",commit=\"${COMMIT}\",version=\"${VERSION}\",branch=\"${BRANCH}\"} 1"
        if [ -n "$EXTRA" ]; then
          body="${body}
        ${EXTRA}"
        fi
        # Reporte/error literal del paso -> label de cicd_check_report. Se sanea
        # (tabs/saltos a espacio, escape de \ y ", truncado a 800 chars) para que
        # sea un label válido del formato de exposición Prometheus. El Pushgateway
        # reemplaza el grupo, así que solo queda el último reporte por check (sin
        # explosión de cardinalidad). Grafana lo muestra como tabla (panel: luego).
        if [ -n "$REPORT" ]; then
          rep="$(printf '%s' "$REPORT" | tr '\n\r\t' '   ' | sed 's/\\/\\\\/g; s/"/\\"/g' | cut -c1-800)"
          body="${body}
        cicd_check_report{report=\"${rep}\"} ${STATUS}"
        fi
        # Normalizar indentación accidental del heredoc y garantizar newline final.
        body="$(printf '%s\n' "$body" | sed 's/^[[:space:]]*//')"

        target="${URL%/}/metrics/job/cicd/product/${PRODUCT}/micro/${MICRO}/env/${ENVIRON}/check/${CHECK}"
        http=$(printf '%s\n' "$body" | curl -sS --max-time 20 -u "$DD_AUTH" \
          --data-binary @- -o /dev/null -w "%{http_code}" "$target" || echo "000")
        if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
          echo "push-metrics: OK ($CHECK $MICRO/$ENVIRON status=$STATUS) HTTP $http"
        else
          echo "::warning::push-metrics: push falló (HTTP $http) para $CHECK $MICRO/$ENVIRON — no rompe el build."
        fi
