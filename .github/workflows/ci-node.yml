name: CI Node

# CI para proyectos Node. Dos jobs paralelos:
#   - checks: typecheck + lint (analisis estatico)
#   - test:   pruebas
# Inputs tests_required / checks_required: si false, esa etapa NO bloquea
# (informativa) y se expone su resultado + detalle para notificar.
on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: "24"
      tests_required:
        description: Si false, los tests NO bloquean (informativos).
        required: false
        type: boolean
        default: true
      checks_required:
        description: Si false, typecheck/lint NO bloquean (informativos).
        required: false
        type: boolean
        default: true
    outputs:
      tsc_outcome:
        value: ${{ jobs.checks.outputs.tsc_outcome }}
      tsc_error:
        value: ${{ jobs.checks.outputs.tsc_error }}
      lint_outcome:
        value: ${{ jobs.checks.outputs.lint_outcome }}
      lint_error:
        value: ${{ jobs.checks.outputs.lint_error }}
      tests_outcome:
        value: ${{ jobs.test.outputs.tests_outcome }}
      failed_tests:
        value: ${{ jobs.test.outputs.failed_tests }}

jobs:
  checks:
    runs-on: ubuntu-latest
    outputs:
      tsc_outcome: ${{ steps.tsc.outcome }}
      lint_outcome: ${{ steps.lint.outcome }}
      tsc_error: ${{ steps.collect.outputs.tsc_error }}
      lint_error: ${{ steps.collect.outputs.lint_error }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        id: tsc
        if: hashFiles('tsconfig.json') != ''
        continue-on-error: ${{ inputs.checks_required == false }}
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tee /tmp/tsc.txt
      - name: Lint
        id: lint
        continue-on-error: ${{ inputs.checks_required == false }}
        run: |
          set -o pipefail
          npm run lint --if-present 2>&1 | tee /tmp/lint.txt
      - name: Collect checks
        id: collect
        if: always()
        run: |
          tsc_err=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/tsc.txt 2>/dev/null | grep -m1 -E 'error TS' | head -c 300 | tr '\n' ' ' || true)
          lint_err=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/lint.txt 2>/dev/null | grep -m1 -E 'problems \(|^Error:|should be|Cannot' | head -c 300 | tr '\n' ' ' || true)
          { echo "tsc_error<<EOF"; echo "$tsc_err"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          { echo "lint_error<<EOF"; echo "$lint_err"; echo "EOF"; } >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    outputs:
      tests_outcome: ${{ steps.collect.outputs.tests_outcome }}
      failed_tests: ${{ steps.collect.outputs.failed_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Test
        id: run
        continue-on-error: ${{ inputs.tests_required == false }}
        run: |
          set -o pipefail
          npm test --if-present 2>&1 | tee /tmp/test-out.txt
      - name: Collect results
        id: collect
        if: always()
        run: |
          echo "tests_outcome=${{ steps.run.outcome }}" >> "$GITHUB_OUTPUT"
          # node:test (tsx --test) usa el reporter spec. Tomar solo la seccion
          # final "✖ failing tests:" (ahi van los tests fallidos, no los suites).
          fails=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/test-out.txt 2>/dev/null \
            | awk '/^✖ failing tests:/{f=1;next} f && /^✖ /{print}' \
            | sed -E 's/^✖ +//; s/ \([0-9.]+m?s\)$//' \
            | head -15 || true)
          { echo "failed_tests<<EOF"; echo "$fails"; echo "EOF"; } >> "$GITHUB_OUTPUT"
