name: CI Node

# CI para proyectos Node. Dos jobs paralelos:
#   - checks: typecheck + lint (analisis estatico)
#   - test:   pruebas
# Inputs tests_required / checks_required: si false, esa etapa NO bloquea
# (informativa) y se expone su resultado + detalle para notificar.
on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: "24"
      tests_required:
        description: Si false, los tests NO bloquean (informativos).
        required: false
        type: boolean
        default: true
      checks_required:
        description: Si false, typecheck/lint NO bloquean (informativos).
        required: false
        type: boolean
        default: true
      product:
        description: Producto (worldbinary...). Vacio = no se pushea métrica al dashboard.
        required: false
        type: string
        default: ""
      microservice:
        description: Nombre del microservicio. Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
      env:
        description: Entorno (dev, qa...). Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
    secrets:
      PUSHGW_AUTH:
        description: Credenciales basicAuth "usuario:clave" del Pushgateway central (opcional).
        required: false
    outputs:
      tsc_outcome:
        value: ${{ jobs.checks.outputs.tsc_outcome }}
      tsc_error:
        value: ${{ jobs.checks.outputs.tsc_error }}
      lint_outcome:
        value: ${{ jobs.checks.outputs.lint_outcome }}
      lint_error:
        value: ${{ jobs.checks.outputs.lint_error }}
      tests_outcome:
        value: ${{ jobs.test.outputs.tests_outcome }}
      failed_tests:
        value: ${{ jobs.test.outputs.failed_tests }}

jobs:
  checks:
    runs-on: ubuntu-latest
    outputs:
      tsc_outcome: ${{ steps.tsc.outcome }}
      lint_outcome: ${{ steps.lint.outcome }}
      tsc_error: ${{ steps.collect.outputs.tsc_error }}
      lint_error: ${{ steps.collect.outputs.lint_error }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        id: tsc
        if: hashFiles('tsconfig.json') != ''
        continue-on-error: ${{ inputs.checks_required == false }}
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tee /tmp/tsc.txt
      - name: Lint
        id: lint
        continue-on-error: ${{ inputs.checks_required == false }}
        run: |
          set -o pipefail
          npm run lint --if-present 2>&1 | tee /tmp/lint.txt
      - name: Collect checks
        id: collect
        if: always()
        run: |
          tsc_err=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/tsc.txt 2>/dev/null | grep -m1 -E 'error TS' | head -c 300 | tr '\n' ' ' || true)
          lint_err=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/lint.txt 2>/dev/null | grep -m1 -A1 -E '^Error:|[0-9]+ problems \(' | tr '\n\t' '  ' | sed -E 's/  +/ /g' | head -c 400 || true)
          { echo "tsc_error<<EOF"; echo "$tsc_err"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          { echo "lint_error<<EOF"; echo "$lint_err"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      # SCA: scan de dependencias del codigo fuente (lockfile + node_modules ya
      # instalados por npm ci). Distinto al scan de imagen de build-image.
      # Solo corre cuando hay contexto (gate dev), no en feature (feedback rapido).
      # No bloquea (exit 0): por ahora solo reporta al dashboard (check=sca).
      - name: SCA scan (Trivy fs)
        if: ${{ always() && inputs.microservice != '' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs.json
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"
      - name: SCA summary
        id: sca
        if: ${{ always() && hashFiles('trivy-fs.json') != '' }}
        run: |
          R=trivy-fs.json
          sev() { jq -r --arg s "$1" '[.Results[]?.Vulnerabilities[]? | select(.Severity==$s)] | length' "$R" 2>/dev/null || echo 0; }
          crit=$(sev CRITICAL); high=$(sev HIGH); med=$(sev MEDIUM); low=$(sev LOW); unk=$(sev UNKNOWN)
          critfix=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" and ((.FixedVersion // "") != ""))] | length' "$R" 2>/dev/null || echo 0)
          echo "SCA: CRITICAL=$crit (fixable=$critfix) HIGH=$high MEDIUM=$med LOW=$low"
          if [ "${critfix:-0}" -gt 0 ]; then status=0; else status=1; fi
          {
            echo "status=$status"
            echo "extra<<EOF"
            echo "cicd_vulnerabilities{severity=\"CRITICAL\"} $crit"
            echo "cicd_vulnerabilities{severity=\"HIGH\"} $high"
            echo "cicd_vulnerabilities{severity=\"MEDIUM\"} $med"
            echo "cicd_vulnerabilities{severity=\"LOW\"} $low"
            echo "cicd_vulnerabilities{severity=\"UNKNOWN\"} $unk"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Push SCA metrics
        if: ${{ always() && inputs.microservice != '' && steps.sca.outputs.status != '' }}
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: sca
          status: ${{ steps.sca.outputs.status }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          extra: ${{ steps.sca.outputs.extra }}

      # check=lint en el dashboard = typecheck + lint juntos. Pasa si ninguno falla
      # (tsc "skipped" cuando no hay tsconfig cuenta como OK).
      - name: Push lint metrics
        if: ${{ always() && inputs.microservice != '' }}
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: lint
          status: ${{ (steps.tsc.outcome != 'failure' && steps.lint.outcome != 'failure') && '1' || '0' }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          report: ${{ steps.collect.outputs.tsc_error }}${{ steps.collect.outputs.lint_error }}

  test:
    runs-on: ubuntu-latest
    outputs:
      tests_outcome: ${{ steps.collect.outputs.tests_outcome }}
      failed_tests: ${{ steps.collect.outputs.failed_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Test
        id: run
        continue-on-error: ${{ inputs.tests_required == false }}
        run: |
          set -o pipefail
          npm test --if-present 2>&1 | tee /tmp/test-out.txt
      - name: Collect results
        id: collect
        if: always()
        run: |
          echo "tests_outcome=${{ steps.run.outcome }}" >> "$GITHUB_OUTPUT"
          # node:test (tsx --test) usa el reporter spec. Tomar solo la seccion
          # final "✖ failing tests:" (ahi van los tests fallidos, no los suites).
          fails=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/test-out.txt 2>/dev/null \
            | awk '/^✖ failing tests:/{f=1;next} f && /^✖ /{print}' \
            | sed -E 's/^✖ +//; s/ \([0-9.]+m?s\)$//' \
            | head -15 || true)
          { echo "failed_tests<<EOF"; echo "$fails"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          fc=$(printf '%s\n' "$fails" | grep -c . || true)
          echo "failed_count=${fc:-0}" >> "$GITHUB_OUTPUT"

      - name: Push unit metrics
        if: ${{ always() && inputs.microservice != '' }}
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: unit
          status: ${{ steps.run.outcome != 'failure' && '1' || '0' }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          extra: cicd_tests{outcome="failed"} ${{ steps.collect.outputs.failed_count }}
          report: ${{ steps.collect.outputs.failed_tests }}
