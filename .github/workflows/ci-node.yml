name: CI Node

# CI para proyectos Node. Separado en dos jobs paralelos:
#   - checks: typecheck + lint (analisis estatico)
#   - test:   pruebas
# El scan de la imagen NO va aqui (necesita la imagen); lo hace build-image.
on:
  workflow_call:
    inputs:
      node_version:
        description: Versión de Node.
        required: false
        type: string
        default: "24"
      tests_required:
        description: Si false, los tests NO bloquean (informativos); se reportan pero el job pasa.
        required: false
        type: boolean
        default: true
    outputs:
      tests_outcome:
        description: Resultado real de los tests (success | failure), aunque sean informativos.
        value: ${{ jobs.test.outputs.tests_outcome }}
      failed_tests:
        description: Lista (multilinea) de tests fallidos.
        value: ${{ jobs.test.outputs.failed_tests }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        if: hashFiles('tsconfig.json') != ''
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint --if-present
      # SAST CodeQL vive en codeql.yml (reusable aparte, lo llama el caller).
      # Scans SCA (Snyk OSS, Trivy fs) van aqui a futuro.

  test:
    runs-on: ubuntu-latest
    outputs:
      tests_outcome: ${{ steps.collect.outputs.tests_outcome }}
      failed_tests: ${{ steps.collect.outputs.failed_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Test
        id: run
        continue-on-error: ${{ inputs.tests_required == false }}
        run: |
          set -o pipefail
          npm test --if-present 2>&1 | tee /tmp/test-out.txt
      - name: Collect results
        id: collect
        if: always()
        run: |
          echo "tests_outcome=${{ steps.run.outcome }}" >> "$GITHUB_OUTPUT"
          fails=$(grep -E '^[[:space:]]*not ok ' /tmp/test-out.txt 2>/dev/null \
            | sed -E 's/.*not ok [0-9]+ - //' \
            | grep -viE 'subtests? failed' \
            | head -15 || true)
          {
            echo "failed_tests<<EOF"
            echo "$fails"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
