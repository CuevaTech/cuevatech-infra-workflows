name: CI Node

on:
  workflow_call:
    inputs:
      node_version:
        description: Versión de Node.
        required: false
        type: string
        default: "24"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      # Scans de dependencias/código (snyk OSS + snyk Code) van aquí — pendiente
      # SNYK_TOKEN (decisión jefe), más codeql/sonar. El scan de la imagen lo hace
      # build-image con Trivy.
