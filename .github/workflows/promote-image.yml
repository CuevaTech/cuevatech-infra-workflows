name: Promote Image

# Promueve una imagen ECR ya construida de un entorno a otro:
#   - Intra-account (misma cuenta+region): docker pull + tag + push.
#   - Cross-account: crane copy preservando digest bit-exacto.
#
# Los secrets son runtime, asi que la misma imagen sirve para dev/qa/prod.
# Tag dst:
#   dst=qa      -> qa-<sha>-<ts>
#   dst=staging -> staging-<sha>-<ts>
#   dst=prod    -> <sha>-<ts> (sin prefijo; el repo en 788 es hermetico)

on:
  workflow_call:
    inputs:
      product:
        description: Producto (worldbinary, impulse, cuevatech).
        required: true
        type: string
      src_env:
        description: Entorno origen (ej. dev, qa).
        required: true
        type: string
      dst_env:
        description: Entorno destino (ej. qa, prod).
        required: true
        type: string
      microservice:
        description: Nombre del microservicio. El repo ECR se deriva como <product>-<microservice>.
        required: true
        type: string
      image_name:
        description: Override opcional del nombre del repo/imagen ECR.
        required: false
        type: string
        default: ""
    outputs:
      image_uri:
        description: URI completa de la imagen promovida.
        value: ${{ jobs.promote.outputs.image_uri }}
      src_tag:
        description: Tag de origen detectado en ECR.
        value: ${{ jobs.promote.outputs.src_tag }}
      dst_tag:
        description: Tag de destino aplicado.
        value: ${{ jobs.promote.outputs.dst_tag }}

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.out.outputs.image_uri }}
      src_tag: ${{ steps.out.outputs.src_tag }}
      dst_tag: ${{ steps.out.outputs.dst_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: src
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/resolve@main
        with:
          product: ${{ inputs.product }}
          env: ${{ inputs.src_env }}

      - id: dst
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/resolve@main
        with:
          product: ${{ inputs.product }}
          env: ${{ inputs.dst_env }}

      - id: mode
        name: Detectar intra vs cross-account
        env:
          SRC_ACC: ${{ steps.src.outputs.account }}
          DST_ACC: ${{ steps.dst.outputs.account }}
          SRC_REG: ${{ steps.src.outputs.region }}
          DST_REG: ${{ steps.dst.outputs.region }}
        run: |
          set -eu
          if [ "$SRC_ACC" = "$DST_ACC" ] && [ "$SRC_REG" = "$DST_REG" ]; then
            echo "is_cross=false" >> "$GITHUB_OUTPUT"
            echo "Mode: INTRA-account (${SRC_ACC}/${SRC_REG})"
          else
            echo "is_cross=true" >> "$GITHUB_OUTPUT"
            echo "Mode: CROSS-account (${SRC_ACC}/${SRC_REG} -> ${DST_ACC}/${DST_REG})"
          fi

      - id: repo
        name: Resolve ECR repo name
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          PRODUCT: ${{ inputs.product }}
          MS: ${{ inputs.microservice }}
        run: echo "name=${IMAGE_NAME:-${PRODUCT}-${MS}}" >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────────────────────────
      # INTRA-ACCOUNT path: docker pull + tag + push, mismo registry.
      # ────────────────────────────────────────────────────────────────────
      - name: AWS credentials (intra)
        if: steps.mode.outputs.is_cross == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.dst.outputs.role_arn }}
          aws-region: ${{ steps.dst.outputs.region }}

      - name: ECR login (intra)
        if: steps.mode.outputs.is_cross == 'false'
        uses: aws-actions/amazon-ecr-login@v2

      - id: intra
        if: steps.mode.outputs.is_cross == 'false'
        name: Find + retag + push (intra)
        env:
          REPO: ${{ steps.repo.outputs.name }}
          REGION: ${{ steps.dst.outputs.region }}
          REGISTRY: ${{ steps.dst.outputs.registry }}
          SRC_ENV: ${{ inputs.src_env }}
          DST_ENV: ${{ inputs.dst_env }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          prefix_for() {
            case "$1" in
              dev)     echo "develop-" ;;
              qa)      echo "qa-" ;;
              staging) echo "staging-" ;;
              prod)    echo "" ;;
              *)       echo "${1}-" ;;
            esac
          }
          src_prefix=$(prefix_for "$SRC_ENV")
          dst_prefix=$(prefix_for "$DST_ENV")

          pattern="^${src_prefix}${SHORT_SHA}-[0-9]+$"
          src_tag=$(aws ecr describe-images \
            --repository-name "$REPO" --region "$REGION" \
            --query "reverse(sort_by(imageDetails[?imageTags!=null], &imagePushedAt))[].imageTags[]" \
            --output text | tr '\t' '\n' | grep -E "$pattern" | head -1 || true)
          if [ -z "$src_tag" ]; then
            echo "::error::No se encontro imagen con patron '${pattern}' en repo ${REPO}."
            exit 1
          fi
          core="${src_tag#${src_prefix}}"
          dst_tag="${dst_prefix}${core}"
          src_uri="${REGISTRY}/${REPO}:${src_tag}"
          dst_uri="${REGISTRY}/${REPO}:${dst_tag}"
          echo "Pulling  $src_uri"
          docker pull "$src_uri"
          docker tag "$src_uri" "$dst_uri"
          echo "Pushing  $dst_uri"
          docker push "$dst_uri"
          {
            echo "src_tag=$src_tag"
            echo "dst_tag=$dst_tag"
            echo "image_uri=$dst_uri"
          } >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────────────────────────
      # CROSS-ACCOUNT path: crane copy preserva digest bit-exacto.
      # Dual login: primero SRC (para buscar y pull), despues DST (para push).
      # ────────────────────────────────────────────────────────────────────
      - name: AWS credentials SRC (cross)
        if: steps.mode.outputs.is_cross == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.src.outputs.role_arn }}
          aws-region: ${{ steps.src.outputs.region }}

      - id: src_find
        if: steps.mode.outputs.is_cross == 'true'
        name: Find src tag en cuenta SRC
        env:
          REPO: ${{ steps.repo.outputs.name }}
          REGION: ${{ steps.src.outputs.region }}
          SRC_ENV: ${{ inputs.src_env }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          prefix_for() {
            case "$1" in
              dev)     echo "develop-" ;;
              qa)      echo "qa-" ;;
              staging) echo "staging-" ;;
              prod)    echo "" ;;
              *)       echo "${1}-" ;;
            esac
          }
          src_prefix=$(prefix_for "$SRC_ENV")
          pattern="^${src_prefix}${SHORT_SHA}-[0-9]+$"
          src_tag=$(aws ecr describe-images \
            --repository-name "$REPO" --region "$REGION" \
            --query "reverse(sort_by(imageDetails[?imageTags!=null], &imagePushedAt))[].imageTags[]" \
            --output text | tr '\t' '\n' | grep -E "$pattern" | head -1 || true)
          if [ -z "$src_tag" ]; then
            echo "::error::No se encontro imagen con patron '${pattern}' en repo ${REPO} (SRC region ${REGION}). El build/promote previo debe correr antes."
            exit 1
          fi
          echo "src_tag=$src_tag" >> "$GITHUB_OUTPUT"

      - name: ECR login SRC (cross)
        if: steps.mode.outputs.is_cross == 'true'
        env:
          REGION: ${{ steps.src.outputs.region }}
          REGISTRY: ${{ steps.src.outputs.registry }}
        run: |
          aws ecr get-login-password --region "$REGION" \
            | docker login --username AWS --password-stdin "$REGISTRY"

      - name: AWS credentials DST (cross)
        if: steps.mode.outputs.is_cross == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.dst.outputs.role_arn }}
          aws-region: ${{ steps.dst.outputs.region }}

      - name: ECR login DST (cross)
        if: steps.mode.outputs.is_cross == 'true'
        env:
          REGION: ${{ steps.dst.outputs.region }}
          REGISTRY: ${{ steps.dst.outputs.registry }}
        run: |
          aws ecr get-login-password --region "$REGION" \
            | docker login --username AWS --password-stdin "$REGISTRY"

      - name: Ensure DST repo (cross)
        if: steps.mode.outputs.is_cross == 'true'
        env:
          REPO: ${{ steps.repo.outputs.name }}
          REGION: ${{ steps.dst.outputs.region }}
        run: |
          aws ecr describe-repositories --repository-names "$REPO" --region "$REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$REPO" --region "$REGION" \
                 --image-scanning-configuration scanOnPush=true \
                 --image-tag-mutability IMMUTABLE

      - name: Install crane (cross)
        if: steps.mode.outputs.is_cross == 'true'
        run: |
          set -euo pipefail
          ver="v0.20.6"
          curl -fsSL "https://github.com/google/go-containerregistry/releases/download/${ver}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xz crane
          sudo install crane /usr/local/bin/
          crane version

      - id: cross
        if: steps.mode.outputs.is_cross == 'true'
        name: Crane copy SRC -> DST
        env:
          REPO: ${{ steps.repo.outputs.name }}
          SRC_REGISTRY: ${{ steps.src.outputs.registry }}
          DST_REGISTRY: ${{ steps.dst.outputs.registry }}
          DST_ENV: ${{ inputs.dst_env }}
          SRC_TAG: ${{ steps.src_find.outputs.src_tag }}
          SRC_ENV: ${{ inputs.src_env }}
        run: |
          set -euo pipefail
          prefix_for() {
            case "$1" in
              dev)     echo "develop-" ;;
              qa)      echo "qa-" ;;
              staging) echo "staging-" ;;
              prod)    echo "" ;;
              *)       echo "${1}-" ;;
            esac
          }
          src_prefix=$(prefix_for "$SRC_ENV")
          dst_prefix=$(prefix_for "$DST_ENV")
          core="${SRC_TAG#${src_prefix}}"
          dst_tag="${dst_prefix}${core}"
          src_uri="${SRC_REGISTRY}/${REPO}:${SRC_TAG}"
          dst_uri="${DST_REGISTRY}/${REPO}:${dst_tag}"
          echo "Copying $src_uri -> $dst_uri"
          crane copy "$src_uri" "$dst_uri"
          {
            echo "src_tag=${SRC_TAG}"
            echo "dst_tag=${dst_tag}"
            echo "image_uri=${dst_uri}"
          } >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────────────────────────
      # Output unificado (uno de los dos paths corrio).
      # ────────────────────────────────────────────────────────────────────
      - id: out
        name: Unify outputs
        env:
          INTRA_SRC: ${{ steps.intra.outputs.src_tag }}
          INTRA_DST: ${{ steps.intra.outputs.dst_tag }}
          INTRA_URI: ${{ steps.intra.outputs.image_uri }}
          CROSS_SRC: ${{ steps.cross.outputs.src_tag }}
          CROSS_DST: ${{ steps.cross.outputs.dst_tag }}
          CROSS_URI: ${{ steps.cross.outputs.image_uri }}
        run: |
          src_tag="${INTRA_SRC:-$CROSS_SRC}"
          dst_tag="${INTRA_DST:-$CROSS_DST}"
          image_uri="${INTRA_URI:-$CROSS_URI}"
          {
            echo "src_tag=$src_tag"
            echo "dst_tag=$dst_tag"
            echo "image_uri=$image_uri"
          } >> "$GITHUB_OUTPUT"
