name: CI

# DEPRECADO. Convencion nueva: el caller invoca el reusable hoja directo
#   (ci-node.yml | ci-python.yml) en vez de este dispatcher con `lang`.
# Motivo: el job hermano con `if` falso queda como nodo "skipped" (circulo
# hueco) en el grafo del run. Llamar la hoja directo => grafo solo con lo que
# ejecuta. Se mantiene funcional para callers aun no migrados; no agregar
# callers nuevos aqui.
#
# Reusable padre. Multi-lenguaje: cada lang agrega un job con su propio if,
# sin tocar a los callers existentes.
on:
  workflow_call:
    inputs:
      lang:
        description: Lenguaje del proyecto (node | python).
        required: true
        type: string

jobs:
  node:
    if: ${{ inputs.lang == 'node' }}
    uses: WorldBinary/worldbinary-infra-workflows/.github/workflows/ci-node.yml@main

  python:
    if: ${{ inputs.lang == 'python' }}
    uses: WorldBinary/worldbinary-infra-workflows/.github/workflows/ci-python.yml@main
