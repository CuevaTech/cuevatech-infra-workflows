name: E2E Newman

# Pruebas de integracion/e2e de APIs con newman (Postman CLI) contra un entorno
# YA desplegado. Nivel qa: el artefacto ya esta deployado, esto valida su
# comportamiento HTTP real. Generico para cualquier microservicio backend.
# Si el caller declara este job, la coleccion es OBLIGATORIA: el job FALLA si no
# existe (no hay e2e silenciosamente saltado). El repo debe traer al menos un
# smoke en la ruta indicada por `collection` (ver ejemplo tests/postman/).
on:
  workflow_call:
    inputs:
      collection:
        description: Ruta a la coleccion Postman en el repo.
        required: false
        type: string
        default: tests/postman/collection.json
      environment:
        description: Ruta al environment Postman (opcional).
        required: false
        type: string
        default: ""
      base_url:
        description: Override de la var base_url de la coleccion (opcional).
        required: false
        type: string
        default: ""
      node_version:
        description: Version de Node para newman.
        required: false
        type: string
        default: "20"
      product:
        description: Producto (worldbinary...). Vacio = no se pushea métrica al dashboard.
        required: false
        type: string
        default: ""
      microservice:
        description: Nombre del microservicio. Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
      env:
        description: Entorno (dev, qa...). Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
    secrets:
      API_KEY:
        description: API key inyectada como var api_key en la coleccion (opcional).
        required: false
      PUSHGW_AUTH:
        description: Credenciales basicAuth "usuario:clave" del Pushgateway central (opcional).
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Run newman
        id: run
        shell: bash
        env:
          COLLECTION: ${{ inputs.collection }}
          ENVIRONMENT: ${{ inputs.environment }}
          BASE_URL: ${{ inputs.base_url }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          if [ ! -f "$COLLECTION" ]; then
            echo "::error::no se encontro coleccion '$COLLECTION'. e2e newman es obligatorio en qa: agrega la coleccion Postman (ver ejemplo en tests/postman/)."
            exit 1
          fi
          npm install -g newman
          args=(run "$COLLECTION" --reporters cli,json --reporter-json-export newman-report.json)
          if [ -n "$ENVIRONMENT" ] && [ -f "$ENVIRONMENT" ]; then
            args+=(-e "$ENVIRONMENT")
          fi
          if [ -n "$BASE_URL" ]; then
            args+=(--env-var "base_url=$BASE_URL")
          fi
          if [ -n "$API_KEY" ]; then
            args+=(--env-var "api_key=$API_KEY")
          fi
          # newman sale != 0 si falla una asercion => corta el pipeline qa.
          newman "${args[@]}"
      - name: Upload newman report
        if: ${{ always() && hashFiles('newman-report.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.json
          if-no-files-found: ignore

      # Resume aserciones del reporte para el dashboard.
      - name: Newman summary
        id: sum
        if: ${{ always() }}
        shell: bash
        run: |
          total=0; failed=0
          if [ -f newman-report.json ]; then
            total=$(jq -r '.run.stats.assertions.total // 0' newman-report.json 2>/dev/null || echo 0)
            failed=$(jq -r '.run.stats.assertions.failed // 0' newman-report.json 2>/dev/null || echo 0)
          fi
          passed=$((total - failed))
          [ "$passed" -lt 0 ] && passed=0
          if [ "${{ steps.run.outcome }}" = "failure" ] || [ "$failed" -gt 0 ]; then status=0; else status=1; fi
          echo "Newman: passed=$passed failed=$failed (total=$total)"
          {
            echo "status=$status"
            echo "extra<<EOF"
            echo "cicd_tests{outcome=\"passed\"} $passed"
            echo "cicd_tests{outcome=\"failed\"} $failed"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push newman metrics
        if: ${{ always() && inputs.microservice != '' }}
        uses: CuevaTech/cuevatech-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: newman
          status: ${{ steps.sum.outputs.status }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          extra: ${{ steps.sum.outputs.extra }}
