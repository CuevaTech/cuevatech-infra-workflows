name: PR Gate

# Gate de PR CENTRALIZADO en el padre. El repo hijo solo invoca este reusable;
# no puede saltarse sonar/trivy borrando algo de su repo. Corre en cada pull_request:
#   - ci      : typecheck + lint + test + Trivy fs (dependencias)   -> Grafana
#   - sonar   : SonarQube quality gate
#   - codeql  : analisis de seguridad del codigo
#   - build   : build Docker + push ECR (genera la imagen) + Trivy de imagen -> Grafana
# Toda la metrica va a Grafana (Pushgateway). El image_uri se expone para el CD.
on:
  workflow_call:
    inputs:
      lang:
        description: Lenguaje del proyecto (node | python).
        required: true
        type: string
      product:
        description: Producto (worldbinary, impulse, cuevatech).
        required: true
        type: string
      microservice:
        description: Nombre del microservicio.
        required: true
        type: string
      env:
        description: Entorno destino (dev por defecto en el gate del PR).
        required: false
        type: string
        default: dev
      node_version:
        required: false
        type: string
        default: "24"
    outputs:
      image_uri:
        description: URI de la imagen construida en el PR (para el CD).
        value: ${{ jobs.build.outputs.image_uri }}

jobs:
  ci:
    if: ${{ inputs.lang == 'node' }}
    uses: ./.github/workflows/ci-node.yml
    with:
      node_version: ${{ inputs.node_version }}
      tests_required: true       # BLOQUEANTE desde 2026-07-01: test rojo corta el PR
      checks_required: true      # BLOQUEANTE: typecheck/lint rojo corta el PR
      product: ${{ inputs.product }}
      microservice: ${{ inputs.microservice }}
      env: ${{ inputs.env }}
    secrets: inherit

  ci-php:
    if: ${{ inputs.lang == 'php' }}
    uses: ./.github/workflows/ci-php.yml
    with:
      tests_required: true       # BLOQUEANTE desde 2026-07-01
      checks_required: true      # BLOQUEANTE (php -l / Pint)
      product: ${{ inputs.product }}
      microservice: ${{ inputs.microservice }}
      env: ${{ inputs.env }}
    secrets: inherit

  sonar:
    uses: ./.github/workflows/sonar-scan.yml
    secrets: inherit

  codeql:
    if: ${{ inputs.lang != 'php' }}   # CodeQL no soporta PHP; en php el scan de codigo lo cubre Trivy fs (SCA) del ci-php
    uses: ./.github/workflows/codeql.yml
    with:
      lang: ${{ inputs.lang }}
      product: ${{ inputs.product }}
      env: ${{ inputs.env }}
      microservice: ${{ inputs.microservice }}
    secrets: inherit

  build:
    uses: ./.github/workflows/build-image.yml
    with:
      product: ${{ inputs.product }}
      env: ${{ inputs.env }}
      microservice: ${{ inputs.microservice }}
      push: true
    secrets: inherit

  # Handoff determinista PR -> CD: graba el image_uri construido como commit status
  # en el HEAD del PR. El CD lo lee por el numero de PR (del merge commit) y deploya
  # esa imagen EXACTA (sin "latest" en ECR, que es fragil con commits de mismo digest).
  record-image:
    needs: build
    # Corre SIEMPRE (no se salta cuando build falla) -> no deja nodo gris "fantasma"
    # en el grafo del gate. Es tolerante: si no hay imagen (build fallo) solo avisa.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Grabar image_uri en commit status del PR
        env:
          GH_TOKEN: ${{ github.token }}
          IMG: ${{ needs.build.outputs.image_uri }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          if gh api -X POST "repos/${REPO}/statuses/${SHA}" \
               -f state=success -f context=deploy/image -f description="$IMG" >/dev/null 2>&1; then
            echo "status deploy/image=$IMG en $SHA"
          else
            echo "::warning::no se pudo grabar el commit status (el caller necesita permissions statuses: write)"
          fi

  # Valida (INFORMATIVO) que el micro backend tenga un graceful-shutdown y que NO este
  # vacio. NO valida que el codigo funcione (eso es de los devs). Fronts: no aplica.
  graceful:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar graceful-shutdown (solo micros backend)
        run: |
          if [ -f composer.json ]; then echo "PHP/Laravel -> graceful-shutdown no aplica"; exit 0; fi
          if grep -qE '"(vite|react|react-dom|next|vue|@angular/core|svelte)"[[:space:]]*:' package.json 2>/dev/null; then
            echo "frontend -> graceful-shutdown no aplica"; exit 0
          fi
          f=$(ls src/graceful-shutdown.ts src/graceful-shutdown.js graceful-shutdown.ts graceful-shutdown.js src/gracefulShutdown.ts 2>/dev/null | head -1)
          if [ -z "$f" ]; then echo "::warning::FALTA graceful-shutdown (micro sin archivo)"; exit 0; fi
          if [ ! -s "$f" ]; then echo "::warning::graceful-shutdown VACIO ($f)"; exit 0; fi
          echo "graceful-shutdown OK: $f ($(wc -l < "$f") lineas)"
