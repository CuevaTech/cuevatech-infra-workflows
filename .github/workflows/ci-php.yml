name: CI PHP

# CI para proyectos PHP / Laravel. Misma interfaz que ci-node (inputs+outputs)
# para que el caller y notify-slack sean uniformes:
#   - checks: syntax (php -l, mapeado a tsc_outcome) + lint (Pint, lint_outcome)
#   - test:   phpunit / artisan test si hay phpunit.xml
# Cada step skip si el proyecto no trae la herramienta. Scan de imagen = build-image.
on:
  workflow_call:
    inputs:
      php_version:
        description: Versión de PHP.
        required: false
        type: string
        default: "8.2"
      tests_required:
        description: Si false, los tests NO bloquean (informativos).
        required: false
        type: boolean
        default: true
      checks_required:
        description: Si false, syntax/lint NO bloquean (informativos).
        required: false
        type: boolean
        default: true
      product:
        description: Producto (worldbinary...). Vacio = no se pushea métrica al dashboard.
        required: false
        type: string
        default: ""
      microservice:
        description: Nombre del microservicio. Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
      env:
        description: Entorno (dev, qa...). Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
    secrets:
      PUSHGW_AUTH:
        description: Credenciales basicAuth "usuario:clave" del Pushgateway central (opcional).
        required: false
    outputs:
      tsc_outcome:
        value: ${{ jobs.checks.outputs.tsc_outcome }}
      tsc_error:
        value: ${{ jobs.checks.outputs.tsc_error }}
      lint_outcome:
        value: ${{ jobs.checks.outputs.lint_outcome }}
      lint_error:
        value: ${{ jobs.checks.outputs.lint_error }}
      tests_outcome:
        value: ${{ jobs.test.outputs.tests_outcome }}
      failed_tests:
        value: ${{ jobs.test.outputs.failed_tests }}

jobs:
  checks:
    runs-on: ubuntu-latest
    outputs:
      tsc_outcome: ${{ steps.tsc.outcome }}
      lint_outcome: ${{ steps.lint.outcome }}
      tsc_error: ${{ steps.collect.outputs.tsc_error }}
      lint_error: ${{ steps.collect.outputs.lint_error }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          tools: composer
          coverage: none
      - name: Install
        run: |
          [ -f composer.json ] && composer install --no-interaction --no-progress --prefer-dist || true
      - name: Syntax (php -l)
        id: tsc
        if: hashFiles('**/*.php') != ''
        continue-on-error: ${{ inputs.checks_required == false }}
        run: |
          set -o pipefail
          find . -path ./vendor -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l 2>&1 \
            | { grep -v 'No syntax errors detected' || true; } | tee /tmp/php-l.txt
      - name: Lint (Pint)
        id: lint
        continue-on-error: ${{ inputs.checks_required == false }}
        run: |
          set -o pipefail
          if [ -x vendor/bin/pint ]; then
            vendor/bin/pint --test 2>&1 | tee /tmp/lint.txt
          else
            echo "Pint no instalado, skip" | tee /tmp/lint.txt
          fi
      - name: Collect checks
        id: collect
        if: always()
        run: |
          tsc_err=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/php-l.txt 2>/dev/null | grep -m1 -iE 'error|parse' | head -c 300 | tr '\n' ' ' || true)
          lint_err=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/lint.txt 2>/dev/null | grep -m1 -iE 'FAIL|error' | head -c 300 | tr '\n' ' ' || true)
          { echo "tsc_error<<EOF"; echo "$tsc_err"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          { echo "lint_error<<EOF"; echo "$lint_err"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      # SCA: scan de dependencias (composer.lock). CodeQL no soporta PHP, asi que
      # este es el unico scan de seguridad de codigo en repos PHP.
      # Solo corre cuando hay contexto (gate dev), no en feature (feedback rapido).
      # No bloquea (exit 0): por ahora solo reporta al dashboard (check=sca).
      - name: SCA scan (Trivy fs)
        if: ${{ always() && inputs.microservice != '' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs.json
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"
      - name: SCA summary
        id: sca
        if: ${{ always() && hashFiles('trivy-fs.json') != '' }}
        run: |
          R=trivy-fs.json
          sev() { jq -r --arg s "$1" '[.Results[]?.Vulnerabilities[]? | select(.Severity==$s)] | length' "$R" 2>/dev/null || echo 0; }
          crit=$(sev CRITICAL); high=$(sev HIGH); med=$(sev MEDIUM); low=$(sev LOW); unk=$(sev UNKNOWN)
          critfix=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" and ((.FixedVersion // "") != ""))] | length' "$R" 2>/dev/null || echo 0)
          echo "SCA: CRITICAL=$crit (fixable=$critfix) HIGH=$high MEDIUM=$med LOW=$low"
          if [ "${critfix:-0}" -gt 0 ]; then status=0; else status=1; fi
          {
            echo "status=$status"
            echo "extra<<EOF"
            echo "cicd_vulnerabilities{severity=\"CRITICAL\"} $crit"
            echo "cicd_vulnerabilities{severity=\"HIGH\"} $high"
            echo "cicd_vulnerabilities{severity=\"MEDIUM\"} $med"
            echo "cicd_vulnerabilities{severity=\"LOW\"} $low"
            echo "cicd_vulnerabilities{severity=\"UNKNOWN\"} $unk"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Push SCA metrics
        if: ${{ always() && inputs.microservice != '' && steps.sca.outputs.status != '' }}
        uses: CuevaTech/cuevatech-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: sca
          status: ${{ steps.sca.outputs.status }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          extra: ${{ steps.sca.outputs.extra }}

      # check=lint en el dashboard = syntax (php -l) + Pint juntos.
      - name: Push lint metrics
        if: ${{ always() && inputs.microservice != '' }}
        uses: CuevaTech/cuevatech-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: lint
          status: ${{ (steps.tsc.outcome != 'failure' && steps.lint.outcome != 'failure') && '1' || '0' }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}

  test:
    runs-on: ubuntu-latest
    outputs:
      tests_outcome: ${{ steps.collect.outputs.tests_outcome }}
      failed_tests: ${{ steps.collect.outputs.failed_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          tools: composer
          coverage: none
      - name: Install
        run: |
          [ -f composer.json ] && composer install --no-interaction --no-progress --prefer-dist || true
      - name: Test
        id: run
        continue-on-error: ${{ inputs.tests_required == false }}
        shell: bash
        run: |
          set -o pipefail
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            if [ -f artisan ]; then
              php artisan test 2>&1 | tee /tmp/test-out.txt
            elif [ -x vendor/bin/phpunit ]; then
              vendor/bin/phpunit 2>&1 | tee /tmp/test-out.txt
            else
              echo "phpunit.xml presente pero sin runner, skip" | tee /tmp/test-out.txt
            fi
          else
            echo "sin phpunit.xml, skipping" | tee /tmp/test-out.txt
          fi
      - name: Collect results
        id: collect
        if: always()
        run: |
          echo "tests_outcome=${{ steps.run.outcome }}" >> "$GITHUB_OUTPUT"
          fails=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/test-out.txt 2>/dev/null \
            | grep -iE 'FAILED|✕|✗| failures?:' | head -15 || true)
          { echo "failed_tests<<EOF"; echo "$fails"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          fc=$(printf '%s\n' "$fails" | grep -c . || true)
          echo "failed_count=${fc:-0}" >> "$GITHUB_OUTPUT"

      - name: Push unit metrics
        if: ${{ always() && inputs.microservice != '' }}
        uses: CuevaTech/cuevatech-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: unit
          status: ${{ steps.run.outcome != 'failure' && '1' || '0' }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          extra: cicd_tests{outcome="failed"} ${{ steps.collect.outputs.failed_count }}
