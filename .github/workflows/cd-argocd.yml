name: CD ArgoCD

# Deploy GitOps a Kubernetes: parcha el tag de la imagen en el repo de manifests
# y pushea. ArgoCD reconcilia (pull). No usa credenciales AWS — solo necesita
# escribir en el repo de manifests. Autentica como GitHub App (token de
# installation efimero, ~1h) en vez de un PAT personal: permiso minimo
# (contents:write solo sobre el repo de manifests), identidad propia <app>[bot]
# y sin depender de la cuenta de una persona. App ID y private key vienen de
# org secrets (se pasan a los callers via `secrets: inherit`).
on:
  workflow_call:
    inputs:
      product:
        description: Producto (worldbinary, impulse, cuevatech).
        required: true
        type: string
      env:
        description: Entorno (dev, qa, staging, prod).
        required: true
        type: string
      microservice:
        description: Nombre del microservicio (carpeta en el repo de manifests + repo ECR).
        required: true
        type: string
      image_uri:
        description: URI completa de la imagen a desplegar (de build-image).
        required: true
        type: string
      manifest_file:
        description: Archivo del manifest a parchar (deployment.yaml; statefulset.yaml para DBs).
        required: false
        type: string
        default: deployment.yaml
      manifests_repo:
        description: Repo de manifests que ArgoCD reconcilia.
        required: false
        type: string
        default: CuevaTech/cuevatech-infra-kubernetes-manifests
    secrets:
      MANIFESTS_APP_ID:
        description: App ID de la GitHub App con contents:write sobre el repo de manifests.
        required: true
      MANIFESTS_APP_PRIVATE_KEY:
        description: Private key (PEM) de la GitHub App.
        required: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate manifests App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MANIFESTS_APP_ID }}
          private-key: ${{ secrets.MANIFESTS_APP_PRIVATE_KEY }}
          # owner = la org del caller (misma org que el repo de manifests).
          # repositories = nombre del repo de manifests (sin owner); la App esta
          # instalada solo ahi, asi el token queda scoped a ese unico repo.
          owner: ${{ github.repository_owner }}
          repositories: worldbinary-infra-kubernetes-manifests

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.manifests_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifests

      - name: Patch image + push
        working-directory: manifests
        env:
          PRODUCT: ${{ inputs.product }}
          ENVIRON: ${{ inputs.env }}
          MS: ${{ inputs.microservice }}
          IMAGE_URI: ${{ inputs.image_uri }}
          MANIFEST_FILE: ${{ inputs.manifest_file }}
        run: |
          set -euo pipefail

          # Server (carpeta de cluster): dev y qa comparten el cluster dev/qa.
          case "$ENVIRON" in
            dev|qa) server="${PRODUCT}-dev" ;;
            *)      server="${PRODUCT}-${ENVIRON}" ;;
          esac
          ns="wb-${ENVIRON}"
          file="${server}/${ns}/${MS}/${MANIFEST_FILE}"

          if [ ! -f "$file" ]; then
            echo "::error::manifest no encontrado: $file"
            exit 1
          fi

          export IMAGE_URI

          # Selecciona el contenedor por nombre (= microservicio) y reemplaza la
          # imagen COMPLETA, sin importar el placeholder previo.
          yq -i '(.spec.template.spec.containers[] | select(.name == strenv(MS)) | .image) = strenv(IMAGE_URI)' "$file"

          # Confirma que la imagen quedo escrita; si no, no existe el contenedor.
          if ! grep -q "$IMAGE_URI" "$file"; then
            echo "::error::no se encontro contenedor name=$MS en $file"
            exit 1
          fi

          # Identidad del commit = la GitHub App (la identidad real del push es
          # el token de installation que generamos arriba).
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add "$file"
          if git diff --cached --quiet; then
            echo "Sin cambios: la imagen ya estaba en $IMAGE_URI"
            exit 0
          fi
          git commit -m "deploy(${PRODUCT}/${ENVIRON}/${MS}): ${IMAGE_URI}"
          git push
          echo "Manifest $file apuntado a $IMAGE_URI (ArgoCD reconcilia)"
