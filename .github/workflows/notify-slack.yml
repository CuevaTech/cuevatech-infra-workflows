name: Notify Slack

# Reusable de notificacion. Postea a Slack el resultado de un run via bot token
# (chat.postMessage). El caller arma el resumen y elige el canal por entorno.
# Si no existe el secret SLACK_BOT_TOKEN, el envio se salta solo (no rompe).
on:
  workflow_call:
    inputs:
      channel:
        description: Channel ID o nombre (#canal) de Slack.
        required: true
        type: string
      title:
        description: Titulo, ej. "CI/CD develop".
        required: true
        type: string
      status:
        description: Resultado global del run (success | failure | cancelled).
        required: true
        type: string
      summary:
        description: Resumen por fase en mrkdwn, ej. "CI ✅ · build ✅ · deploy 🔴".
        required: false
        type: string
        default: ""
      failed_tests:
        description: Lista (multilinea) de tests fallidos; vacio si no hay.
        required: false
        type: string
        default: ""
      tests_informational:
        description: Si los tests son informativos (no bloquean) en este entorno.
        required: false
        type: boolean
        default: false
      defectdojo_url:
        description: Link al reporte en DefectDojo; vacio si no hubo scan.
        required: false
        type: string
        default: ""
    secrets:
      SLACK_BOT_TOKEN:
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: Compose message
        id: msg
        if: ${{ env.SLACK_BOT_TOKEN != '' }}
        env:
          STATUS: ${{ inputs.status }}
          TITLE: ${{ inputs.title }}
          SUMMARY: ${{ inputs.summary }}
          FAILED_TESTS: ${{ inputs.failed_tests }}
          INFORMATIONAL: ${{ inputs.tests_informational }}
          DD_URL: ${{ inputs.defectdojo_url }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          SERVER: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - >> "$GITHUB_OUTPUT" <<'PY'
          import json, os
          st = os.environ.get("STATUS", "")
          icon = {"success": "✅", "cancelled": "⚪"}.get(st, "🔴")
          repo = os.environ["REPO"]; server = os.environ["SERVER"]
          branch = os.environ.get("BRANCH", ""); sha = os.environ.get("SHA", "")
          run_id = os.environ.get("RUN_ID", "")
          repo_url = f"{server}/{repo}"
          run_url = f"{server}/{repo}/actions/runs/{run_id}"
          commit_url = f"{server}/{repo}/commit/{sha}"
          lines = [
              f"{icon} *{os.environ.get('TITLE','')}* — <{repo_url}|{repo}> (`{branch}`)",
              f"*Resultado:* {st}",
          ]
          summary = os.environ.get("SUMMARY", "")
          if summary:
              lines.append(f"*Fases:* {summary}")
          lines.append(f"*Commit:* <{commit_url}|{sha[:7]}>")
          ft = os.environ.get("FAILED_TESTS", "").strip()
          if ft:
              tag = " (informativo, no bloquea)" if os.environ.get("INFORMATIONAL") == "true" else ""
              lines.append(f"*Tests fallidos{tag}:*")
              for ln in ft.splitlines():
                  if ln.strip():
                      lines.append(f"• {ln.strip()}")
          links = f"<{run_url}|Ver run>"
          dd = os.environ.get("DD_URL", "")
          if dd:
              links += f"  ·  <{dd}|Ver en DefectDojo>"
          lines.append(links)
          text = "\n".join(lines)
          # json.dumps -> string con \n escapados (valido en una linea de OUTPUT)
          print("text=" + json.dumps(text)[1:-1])
          PY

      - name: Send to Slack
        if: ${{ env.SLACK_BOT_TOKEN != '' }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ env.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ inputs.channel }}",
              "text": "${{ steps.msg.outputs.text }}",
              "blocks": [
                { "type": "section", "text": { "type": "mrkdwn", "text": "${{ steps.msg.outputs.text }}" } }
              ]
            }
