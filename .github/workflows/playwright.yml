name: E2E Playwright

# Pruebas e2e de navegador con Playwright contra un frontend YA desplegado.
# Nivel qa de los repos frontend (no aplica a backends). Si el repo no trae
# playwright.config.*, el job se salta (onboarding gradual).
on:
  workflow_call:
    inputs:
      base_url:
        description: URL del frontend qa a probar (exporta PLAYWRIGHT_BASE_URL).
        required: false
        type: string
        default: ""
      node_version:
        description: Version de Node.
        required: false
        type: string
        default: "20"
      working_directory:
        description: Directorio del proyecto front (monorepo).
        required: false
        type: string
        default: "."
      product:
        description: Producto (worldbinary...). Vacio = no se pushea métrica al dashboard.
        required: false
        type: string
        default: ""
      microservice:
        description: Nombre del microservicio/front. Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
      env:
        description: Entorno (dev, qa...). Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
    secrets:
      PUSHGW_AUTH:
        description: Credenciales basicAuth "usuario:clave" del Pushgateway central (opcional).
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Detectar config Playwright
        id: detect
        shell: bash
        run: |
          if ls playwright.config.* >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::sin playwright.config.*, salto e2e playwright"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install deps
        if: steps.detect.outputs.found == 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Install browsers
        if: steps.detect.outputs.found == 'true'
        run: npx playwright install --with-deps
      - name: Run Playwright
        id: run
        if: steps.detect.outputs.found == 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: pw-results.json
        # reporter json (ademas de line) para extraer conteos al dashboard.
        run: npx playwright test --reporter=line,json
      - name: Upload report
        if: ${{ always() && steps.detect.outputs.found == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ inputs.working_directory }}/playwright-report
          if-no-files-found: ignore

      - name: Playwright summary
        id: sum
        if: ${{ always() && steps.detect.outputs.found == 'true' }}
        shell: bash
        run: |
          passed=0; failed=0
          if [ -f pw-results.json ]; then
            passed=$(jq -r '.stats.expected // 0' pw-results.json 2>/dev/null || echo 0)
            failed=$(jq -r '(.stats.unexpected // 0) + (.stats.flaky // 0)' pw-results.json 2>/dev/null || echo 0)
          fi
          if [ "${{ steps.run.outcome }}" = "failure" ] || [ "${failed:-0}" -gt 0 ]; then status=0; else status=1; fi
          echo "Playwright: passed=$passed failed=$failed"
          {
            echo "status=$status"
            echo "extra<<EOF"
            echo "cicd_tests{outcome=\"passed\"} ${passed:-0}"
            echo "cicd_tests{outcome=\"failed\"} ${failed:-0}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push playwright metrics
        if: ${{ always() && steps.detect.outputs.found == 'true' && inputs.microservice != '' }}
        uses: CuevaTech/cuevatech-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: playwright
          status: ${{ steps.sum.outputs.status }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          extra: ${{ steps.sum.outputs.extra }}
