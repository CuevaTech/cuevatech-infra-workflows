name: CodeQL

# SAST con CodeQL. Genera el SARIF localmente (upload:false) y NO lo sube a
# GitHub code scanning — eso requiere GitHub Advanced Security en repos
# privados. En su lugar se cuenta por severidad y el estado va al Pushgateway
# central (dashboard semaforo, mismo flujo que el reporte Trivy de build-image).
# Gate: bloquea el run si hay findings de severidad CRITICAL
# (security-severity >= 9.0 en el SARIF de CodeQL).
on:
  workflow_call:
    inputs:
      lang:
        description: Lenguaje del proyecto (node | python).
        required: true
        type: string
      product:
        description: Producto (worldbinary, impulse, cuevatech).
        required: true
        type: string
      env:
        description: Entorno (dev, qa, staging, prod) — contexto del dashboard.
        required: true
        type: string
      microservice:
        description: Nombre del microservicio — contexto del dashboard.
        required: true
        type: string
    secrets:
      PUSHGW_AUTH:
        description: Credenciales basicAuth "usuario:clave" del Pushgateway central (opcional).
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Map lenguaje -> CodeQL
        id: lang
        shell: bash
        run: |
          case "${{ inputs.lang }}" in
            node)   echo "ql=javascript-typescript" >> "$GITHUB_OUTPUT" ;;
            python) echo "ql=python" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::lang no soportado: ${{ inputs.lang }}"; exit 1 ;;
          esac

      # build-mode none: lenguajes interpretados (python/js) no compilan, no
      # hace falta autobuild.
      - name: CodeQL init
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ steps.lang.outputs.ql }}
          build-mode: none

      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3
        with:
          upload: false
          output: codeql-results

      - name: Localizar SARIF
        id: sarif
        shell: bash
        run: |
          f=$(ls codeql-results/*.sarif 2>/dev/null | head -1)
          if [ -z "$f" ]; then echo "::error::no se genero SARIF"; exit 1; fi
          echo "file=$f" >> "$GITHUB_OUTPUT"

      # Cuenta findings por severidad (security-severity = escala CVSS) y decide
      # el gate (CRITICAL >= 9.0). La decision sale del SARIF ya generado.
      - name: CodeQL summary + gate decision
        id: codeql
        shell: bash
        if: ${{ always() && steps.sarif.outputs.file != '' }}
        env:
          SARIF: ${{ steps.sarif.outputs.file }}
        run: |
          # Devuelve la lista de security-severity numericas de todos los findings.
          scores=$(jq -r '
            [ .runs[]
              | ( (.tool.driver.rules // []) + ([ .tool.extensions[]?.rules[]? ]) ) as $rules
              | .results[]?
              | (.ruleId // .rule.id) as $rid
              | ( $rules[] | select(.id == $rid) | .properties."security-severity"? )
              | select(. != null) | tonumber
            ] | .[]' "$SARIF" 2>/dev/null || true)
          crit=0; high=0; med=0; low=0
          for s in $scores; do
            awk "BEGIN{exit !($s>=9.0)}"        && { crit=$((crit+1)); continue; }
            awk "BEGIN{exit !($s>=7.0 && $s<9.0)}" && { high=$((high+1)); continue; }
            awk "BEGIN{exit !($s>=4.0 && $s<7.0)}" && { med=$((med+1)); continue; }
            low=$((low+1))
          done
          echo "CodeQL: CRITICAL=$crit HIGH=$high MEDIUM=$med LOW=$low"
          if [ "$crit" -gt 0 ]; then status=0; gatefail=1; else status=1; gatefail=0; fi
          {
            echo "status=$status"
            echo "gatefail=$gatefail"
            echo "extra<<EOF"
            echo "cicd_vulnerabilities{severity=\"CRITICAL\"} $crit"
            echo "cicd_vulnerabilities{severity=\"HIGH\"} $high"
            echo "cicd_vulnerabilities{severity=\"MEDIUM\"} $med"
            echo "cicd_vulnerabilities{severity=\"LOW\"} $low"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push CodeQL metrics
        if: ${{ always() && steps.codeql.outputs.status != '' }}
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: codeql
          status: ${{ steps.codeql.outputs.status }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          extra: ${{ steps.codeql.outputs.extra }}

      - name: Gate CRITICAL
        if: ${{ always() && steps.codeql.outputs.gatefail == '1' }}
        run: |
          echo "::error::CodeQL encontro finding(s) CRITICAL (security-severity >= 9.0)"
          exit 1
