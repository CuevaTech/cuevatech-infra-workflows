name: Build Image

# Construye y publica una imagen Docker a ECR de la cuenta resuelta por product+env.
# Auth via OIDC (sin access keys). Tag inmutable SHORT_SHA-TIMESTAMP, nunca :latest.
on:
  workflow_call:
    inputs:
      product:
        description: Producto (worldbinary, impulse, cuevatech).
        required: true
        type: string
      env:
        description: Entorno (dev, qa, staging, prod).
        required: true
        type: string
      microservice:
        description: Nombre del microservicio. El repo ECR se deriva como <product>-<microservice>.
        required: true
        type: string
      image_name:
        description: Override opcional del nombre del repo/imagen ECR. Si se omite, usa <product>-<microservice>.
        required: false
        type: string
        default: ""
      context:
        description: Contexto de build de Docker.
        required: false
        type: string
        default: "."
      dockerfile:
        description: Ruta del Dockerfile relativa al contexto.
        required: false
        type: string
        default: Dockerfile
      push:
        description: >-
          Si true (default) construye, escanea con Trivy y PUSHEA la imagen a
          ECR. Si false (gate de PR) solo construye + escanea + reporta al
          dashboard, sin pushear ni tocar ECR. Permite gatear el PR sin ensuciar
          el registry.
        required: false
        type: boolean
        default: true
    outputs:
      image_uri:
        description: URI completa de la imagen pusheada (con tag).
        value: ${{ jobs.build.outputs.image_uri }}
    secrets:
      PUSHGW_AUTH:
        description: Credenciales basicAuth "usuario:clave" del Pushgateway central (opcional).
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/resolve@main
        with:
          product: ${{ inputs.product }}
          env: ${{ inputs.env }}

      - name: AWS credentials (OIDC)
        if: ${{ inputs.push }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.resolve.outputs.role_arn }}
          aws-region: ${{ steps.resolve.outputs.region }}

      - name: Login to ECR
        if: ${{ inputs.push }}
        uses: aws-actions/amazon-ecr-login@v2

      - id: repo
        name: Resolve ECR repo name
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          PRODUCT: ${{ inputs.product }}
          MS: ${{ inputs.microservice }}
        run: echo "name=${IMAGE_NAME:-${PRODUCT}-${MS}}" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repo
        if: ${{ inputs.push }}
        env:
          REPO: ${{ steps.repo.outputs.name }}
          REGION: ${{ steps.resolve.outputs.region }}
        run: |
          aws ecr describe-repositories --repository-names "$REPO" --region "$REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$REPO" --region "$REGION" \
                 --image-scanning-configuration scanOnPush=true \
                 --image-tag-mutability IMMUTABLE

      - id: meta
        name: Compute tag and URI
        env:
          REGISTRY: ${{ steps.resolve.outputs.registry }}
          REPO: ${{ steps.repo.outputs.name }}
          ENVIRON: ${{ inputs.env }}
        run: |
          # Prefijo de tag por entorno. prod queda sin prefijo porque su repo
          # vive en cuenta hermetica separada (788), el nombre del repo no
          # mezcla envs y el prefijo seria redundante. Cuenta dev/qa (294)
          # comparte repo, asi que el prefijo distingue grupos para lifecycle.
          case "$ENVIRON" in
            dev)     prefix="develop-" ;;
            qa)      prefix="qa-" ;;
            staging) prefix="staging-" ;;
            prod)    prefix="" ;;
            *)       prefix="${ENVIRON}-" ;;
          esac
          tag="${prefix}$(git rev-parse --short HEAD)-$(date -u +%Y%m%d%H%M%S)"
          {
            echo "tag=$tag"
            echo "image_uri=${REGISTRY}/${REPO}:${tag}"
          } >> "$GITHUB_OUTPUT"

      # El cache gha requiere el driver docker-container (el driver docker
      # default no soporta cache export). setup-buildx lo provee.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.meta.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Reporte completo (todas las severidades) para contar y pushear al
      # dashboard. No bloquea (exit 0); el gate de mas abajo es el que corta.
      - name: Trivy report (JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: json
          output: trivy-report.json
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"

      # Resume el reporte: cuenta vulnerabilidades por severidad y decide el
      # gate (falla si hay CRITICAL con fix disponible). Reemplaza el segundo run
      # de Trivy: la decision sale del mismo JSON ya generado.
      - name: Trivy summary + gate decision
        id: trivy
        if: ${{ always() && hashFiles('trivy-report.json') != '' }}
        run: |
          R=trivy-report.json
          sev() { jq -r --arg s "$1" '[.Results[]?.Vulnerabilities[]? | select(.Severity==$s)] | length' "$R" 2>/dev/null || echo 0; }
          crit=$(sev CRITICAL); high=$(sev HIGH); med=$(sev MEDIUM); low=$(sev LOW); unk=$(sev UNKNOWN)
          critfix=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" and ((.FixedVersion // "") != ""))] | length' "$R" 2>/dev/null || echo 0)
          echo "Trivy: CRITICAL=$crit (fixable=$critfix) HIGH=$high MEDIUM=$med LOW=$low UNKNOWN=$unk"
          if [ "${critfix:-0}" -gt 0 ]; then status=0; gatefail=1; else status=1; gatefail=0; fi
          {
            echo "status=$status"
            echo "gatefail=$gatefail"
            echo "extra<<EOF"
            echo "cicd_vulnerabilities{severity=\"CRITICAL\"} $crit"
            echo "cicd_vulnerabilities{severity=\"HIGH\"} $high"
            echo "cicd_vulnerabilities{severity=\"MEDIUM\"} $med"
            echo "cicd_vulnerabilities{severity=\"LOW\"} $low"
            echo "cicd_vulnerabilities{severity=\"UNKNOWN\"} $unk"
            echo "EOF"
            # Reporte literal: top 20 CRITICAL/HIGH (CVE, paquete, fix) para Grafana.
            echo "report<<EOF"
            jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | .[:20][] | "\(.Severity) \(.VulnerabilityID) \(.PkgName)@\(.InstalledVersion) -> \(.FixedVersion // "sin-fix")"' "$R" 2>/dev/null | head -20
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Pushea el estado de Trivy al Pushgateway central (dashboard semaforo).
      - name: Push Trivy metrics
        if: ${{ always() && steps.trivy.outputs.status != '' }}
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: trivy
          status: ${{ steps.trivy.outputs.status }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          version: ${{ steps.meta.outputs.tag }}
          extra: ${{ steps.trivy.outputs.extra }}
          report: ${{ steps.trivy.outputs.report }}

      # Gate: bloquea (exit 1) ante CRITICAL con fix disponible. La decision ya
      # se calculo arriba; aqui solo se corta para no publicar la imagen.
      - name: Trivy gate (CRITICAL)
        if: ${{ always() && steps.trivy.outputs.gatefail == '1' }}
        run: |
          echo "::error::Trivy gate: hay vulnerabilidades CRITICAL con fix disponible. No se publica la imagen."
          exit 1

      - name: Push image
        if: ${{ inputs.push }}
        run: docker push ${{ steps.meta.outputs.image_uri }}
