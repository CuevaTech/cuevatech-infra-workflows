name: Build Image

# Construye y publica una imagen Docker a ECR de la cuenta resuelta por product+env.
# Auth via OIDC (sin access keys). Tag inmutable SHORT_SHA-TIMESTAMP, nunca :latest.
on:
  workflow_call:
    inputs:
      product:
        description: Producto (worldbinary, impulse, cuevatech).
        required: true
        type: string
      env:
        description: Entorno (dev, qa, staging, prod).
        required: true
        type: string
      microservice:
        description: Nombre del microservicio. El repo ECR se deriva como <product>-<microservice>.
        required: true
        type: string
      image_name:
        description: Override opcional del nombre del repo/imagen ECR. Si se omite, usa <product>-<microservice>.
        required: false
        type: string
        default: ""
      context:
        description: Contexto de build de Docker.
        required: false
        type: string
        default: "."
      dockerfile:
        description: Ruta del Dockerfile relativa al contexto.
        required: false
        type: string
        default: Dockerfile
    outputs:
      image_uri:
        description: URI completa de la imagen pusheada (con tag).
        value: ${{ jobs.build.outputs.image_uri }}
    secrets:
      DEFECTDOJO_TOKEN:
        description: Token API DefectDojo para subir el reporte de scan (opcional).
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/resolve@main
        with:
          product: ${{ inputs.product }}
          env: ${{ inputs.env }}

      - name: AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.resolve.outputs.role_arn }}
          aws-region: ${{ steps.resolve.outputs.region }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - id: repo
        name: Resolve ECR repo name
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          PRODUCT: ${{ inputs.product }}
          MS: ${{ inputs.microservice }}
        run: echo "name=${IMAGE_NAME:-${PRODUCT}-${MS}}" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repo
        env:
          REPO: ${{ steps.repo.outputs.name }}
          REGION: ${{ steps.resolve.outputs.region }}
        run: |
          aws ecr describe-repositories --repository-names "$REPO" --region "$REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$REPO" --region "$REGION" \
                 --image-scanning-configuration scanOnPush=true \
                 --image-tag-mutability IMMUTABLE

      - id: meta
        name: Compute tag and URI
        env:
          REGISTRY: ${{ steps.resolve.outputs.registry }}
          REPO: ${{ steps.repo.outputs.name }}
        run: |
          tag="$(git rev-parse --short HEAD)-$(date -u +%Y%m%d%H%M%S)"
          {
            echo "tag=$tag"
            echo "image_uri=${REGISTRY}/${REPO}:${tag}"
          } >> "$GITHUB_OUTPUT"

      # El cache gha requiere el driver docker-container (el driver docker
      # default no soporta cache export). setup-buildx lo provee.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.meta.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Reporte completo (todas las severidades) para el panel DefectDojo.
      # No bloquea (exit 0); el gate de mas abajo es el que corta.
      - name: Trivy report (JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: json
          output: trivy-report.json
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"

      # Sube el reporte a DefectDojo (panel unificado de hallazgos). No bloquea:
      # si falta URL/token o DefectDojo no responde, el build continua.
      - name: Upload report to DefectDojo
        if: ${{ always() && vars.DEFECTDOJO_URL != '' && hashFiles('trivy-report.json') != '' }}
        continue-on-error: true
        env:
          DD_URL: ${{ vars.DEFECTDOJO_URL }}
          DD_TOKEN: ${{ secrets.DEFECTDOJO_TOKEN }}
          PRODUCT: ${{ inputs.product }}
          MS: ${{ inputs.microservice }}
          ENVIRON: ${{ inputs.env }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if [ -z "$DD_TOKEN" ]; then
            echo "DEFECTDOJO_TOKEN vacio, salto upload"; exit 0
          fi
          curl -sS -X POST "${DD_URL%/}/api/v2/reimport-scan/" \
            -H "Authorization: Token $DD_TOKEN" \
            -F "scan_type=Trivy Scan" \
            -F "file=@trivy-report.json" \
            -F "auto_create_context=true" \
            -F "product_name=${PRODUCT}-${MS}" \
            -F "engagement_name=${ENVIRON}" \
            -F "version=${TAG}" \
            -F "active=true" -F "verified=false" \
            -F "minimum_severity=Info" \
            -o /dev/null -w "DefectDojo upload HTTP %{http_code}\n"

      # Gate: bloquea (exit 1) solo ante CRITICAL con fix disponible, asi no se
      # publica una imagen con vulnerabilidades criticas.
      - name: Trivy gate (CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push image
        run: docker push ${{ steps.meta.outputs.image_uri }}
