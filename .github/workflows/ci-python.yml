name: CI Python

# CI para proyectos Python. Mismo patron que ci-node:
#   - checks: typecheck (mypy si hay config) + lint (ruff si hay config)
#   - test:   pytest si hay carpeta tests/ o archivos test_*.py / *_test.py
# Sin asumir nada project-specific: cada step skip si el proyecto no trae la
# config correspondiente. Scan de imagen lo hace build-image.
on:
  workflow_call:
    inputs:
      python_version:
        description: Versión de Python.
        required: false
        type: string
        default: "3.11"
      product:
        description: Producto (worldbinary...). Vacio = no se pushea métrica al dashboard.
        required: false
        type: string
        default: ""
      microservice:
        description: Nombre del microservicio. Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
      env:
        description: Entorno (dev, qa...). Vacio = no se pushea métrica.
        required: false
        type: string
        default: ""
    secrets:
      PUSHGW_AUTH:
        description: Credenciales basicAuth "usuario:clave" del Pushgateway central (opcional).
        required: false

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
      - name: Install runtime deps
        run: |
          [ -f requirements.txt ] && pip install -r requirements.txt || true
      - name: Install dev deps
        run: |
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
      - name: Typecheck (mypy)
        id: mypy
        if: hashFiles('mypy.ini') != ''
        run: |
          pip install mypy
          mypy .
      - name: Lint (ruff)
        id: ruff
        if: hashFiles('ruff.toml') != '' || hashFiles('.ruff.toml') != ''
        run: |
          pip install ruff
          ruff check .
      # SAST CodeQL vive en codeql.yml (reusable aparte, lo llama el caller).

      # SCA: scan de dependencias del codigo fuente (requirements ya instalados).
      # Solo corre cuando hay contexto (gate dev), no en feature (feedback rapido).
      # No bloquea (exit 0): por ahora solo reporta al dashboard (check=sca).
      - name: SCA scan (Trivy fs)
        if: ${{ always() && inputs.microservice != '' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs.json
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"
      - name: SCA summary
        id: sca
        if: ${{ always() && hashFiles('trivy-fs.json') != '' }}
        run: |
          R=trivy-fs.json
          sev() { jq -r --arg s "$1" '[.Results[]?.Vulnerabilities[]? | select(.Severity==$s)] | length' "$R" 2>/dev/null || echo 0; }
          crit=$(sev CRITICAL); high=$(sev HIGH); med=$(sev MEDIUM); low=$(sev LOW); unk=$(sev UNKNOWN)
          critfix=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" and ((.FixedVersion // "") != ""))] | length' "$R" 2>/dev/null || echo 0)
          echo "SCA: CRITICAL=$crit (fixable=$critfix) HIGH=$high MEDIUM=$med LOW=$low"
          if [ "${critfix:-0}" -gt 0 ]; then status=0; else status=1; fi
          {
            echo "status=$status"
            echo "extra<<EOF"
            echo "cicd_vulnerabilities{severity=\"CRITICAL\"} $crit"
            echo "cicd_vulnerabilities{severity=\"HIGH\"} $high"
            echo "cicd_vulnerabilities{severity=\"MEDIUM\"} $med"
            echo "cicd_vulnerabilities{severity=\"LOW\"} $low"
            echo "cicd_vulnerabilities{severity=\"UNKNOWN\"} $unk"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Push SCA metrics
        if: ${{ always() && inputs.microservice != '' && steps.sca.outputs.status != '' }}
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: sca
          status: ${{ steps.sca.outputs.status }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
          extra: ${{ steps.sca.outputs.extra }}

      - name: Push lint metrics
        if: ${{ always() && inputs.microservice != '' }}
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: lint
          status: ${{ (steps.mypy.outcome != 'failure' && steps.ruff.outcome != 'failure') && '1' || '0' }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
      - name: Install
        run: |
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
      - name: Test (pytest)
        id: run
        shell: bash
        run: |
          # Corre pytest solo si existen archivos de test Python reales (no un
          # simple dir 'tests' que puede tener otros artefactos, ej. colecciones
          # Postman en tests/postman). Ademas tolera exit 5 de pytest
          # ("no se colecto ningun test") como no-fallo.
          has_py=$(find . -name '.git' -prune -o \( -name 'test_*.py' -o -name '*_test.py' \) -print 2>/dev/null | head -1)
          if [ -n "$has_py" ]; then
            pip install pytest
            pytest || { ec=$?; if [ "$ec" -eq 5 ]; then echo "pytest: no tests collected"; else exit "$ec"; fi; }
          else
            echo "no python tests detected, skipping"
          fi

      - name: Push unit metrics
        if: ${{ always() && inputs.microservice != '' }}
        uses: WorldBinary/worldbinary-infra-workflows/.github/actions/push-metrics@main
        with:
          auth: ${{ secrets.PUSHGW_AUTH }}
          product: ${{ inputs.product }}
          micro: ${{ inputs.microservice }}
          env: ${{ inputs.env }}
          check: unit
          status: ${{ steps.run.outcome != 'failure' && '1' || '0' }}
          branch: ${{ github.ref_name }}
          build_id: ${{ github.run_id }}
          commit: ${{ github.sha }}
